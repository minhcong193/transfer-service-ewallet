spring:
  application:
    name: transfer-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: MonitoringServiceHikariPool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:yourpassword}
      database: ${REDIS_DATABASE:0}

      connect-timeout: 3s
      timeout: 3s

      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2s
          time-between-eviction-runs: 30s
  jpa:
    # In câu lệnh SQL ra console để debug
    show-sql: true
    # Sử dụng Dialect chuẩn của PostgreSQL để Hibernate tối ưu hóa cú pháp SQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        # Định dạng SQL cho dễ đọc
        format_sql: true
        order_by:
          # Đảm bảo các giá trị NULL nằm cuối cùng khi thực hiện sắp xếp
          default_null_ordering: last
        cache:
          # Tắt bộ nhớ đệm cấp 2 (L2 Cache) của Hibernate.
          # Nếu bạn muốn dùng Redis làm L2 Cache cho Hibernate, cần cấu hình riêng.
          use_second_level_cache: false
          region:
            factory_class: org.hibernate.cache.ehcache.EhCacheRegionFactory
        jdbc:
          # Thay vì gửi 500 câu lệnh INSERT riêng lẻ xuống Database,
          # Hibernate sẽ gom chúng thành 1 gói (batch) để gửi 1 lần.
          batch_size: 500
          time_zone: GMT+7
        # order_inserts / order_updates: Sắp xếp các câu lệnh SQL
        # theo thứ tự bảng để tối ưu hóa khả năng gom nhóm (batching) ở trên
        order_inserts: true
        order_updates: true
  liquibase:
    enabled: true
    change-log: classpath:liquibase/master.xml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092,localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      acks: all
      retries: 3

      properties:
        spring.json.add.type.headers: false
        enable.idempotence: true
        delivery.timeout.ms: 30000
        request.timeout.ms: 10000
        linger.ms: 50

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://auth.minhtc.io.vn/realms/ewallet}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:https://auth.minhtc.io.vn/realms/ewallet/protocol/openid-connect/certs}
      client:
        registration:
          wallet-service:
            provider: keycloak
            client-id: wallet-service
            client-secret: ${KEYCLOAK_WALLET_SERVICE_CLIENT_SECRET}
            authorization-grant-type: client_credentials

        provider:
          keycloak:
            token-uri: https://auth.minhtc.io.vn/realms/ewallet/protocol/openid-connect/token

app:
  kafka:
    topics:
      security-events: ${SECURITY_EVENTS_TOPIC:security-events}
  r2:
    endpoint: ${S3_API_ENDPOINT}
    access-key: ${R2_ACCESS_KEY_ID}
    secret-key: ${R2_SECRET_ACCESS_KEY}
    region: "auto" # Mặc dù R2 không có region, SDK vẫn cần giá trị này
    bucket-name: "ewallet-data"
  clients:
    wallet:
      base-url: ${WALLET_SERVICE_URI:http://localhost:8083}
      connect-timeout: 3s
      read-timeout: 10s
  transfer:
    limits:
      min-amount: 1000.0000
      max-amount: 20000000.0000
      daily-outgoing-limit: 50000000.0000
    otp:
      ttl: 5m
      record-ttl: 24h
      resend-cooldown: 60s
      max-attempts: 5
      max-resends: 3
      max-daily-otp: 10
      hmac-secret: ${OTP_HMAC_SECRET}
    redis:
      key-prefix: transfer-service
      command-timeout: 3s
    recovery:
      batch-size: 20
      retry-delay: 30s
      processing-lease: 2m
      max-recovery-attempts: 10
      max-compensation-attempts: 20
  otp:
    ttl: ${TRANSFER_OTP_TTL:5m}
    max-attempts: ${TRANSFER_OTP_MAX_ATTEMPTS:5}
    resend-cooldown: ${TRANSFER_OTP_RESEND_COOLDOWN:60s}
    max-resend: ${TRANSFER_OTP_MAX_RESEND:3}
    max-otp-per-user-per-day: ${TRANSFER_OTP_DAILY_LIMIT:10}
    hash-secret: ${OTP_HMAC_SECRET}
  mail:
    brevo:
      host: ${BREVO_SMTP_HOST:smtp-relay.brevo.com}
      port: ${BREVO_SMTP_PORT:587}

      # Login tại Brevo SMTP Settings
      username: ${BREVO_SMTP_USERNAME:afe4e3001@smtp-brevo.com}

      # SMTP key value, không phải password tài khoản Brevo
      smtp-key: ${BREVO_SMTP_KEY}

      # Sender đã verify trong Brevo
      sender-email: ${BREVO_SENDER_EMAIL:notification@minhtc.io.vn}
      sender-name: ${BREVO_SENDER_NAME:E-Wallet Application}

      transfer-otp-subject: ${BREVO_TRANSFER_OTP_SUBJECT:Mã OTP xác nhận chuyển tiền}

      connection-timeout-millis: 5000
      read-timeout-millis: 10000
      write-timeout-millis: 10000
logging:
  level:
    root: INFO
    minhtc.vn.monitoring: DEBUG
    org.springframework.kafka: INFO
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
server:
  port: 8084